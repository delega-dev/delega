name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest httpx

      - name: Lint (non-blocking, tracking existing issues)
        run: ruff check backend/ || true

      - name: Type check (non-blocking)
        run: |
          pip install pyright
          pyright backend/ || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t delega:test .

      - name: Verify container starts
        run: |
          docker run -d --name delega-test -p 18890:18890 -v /tmp/delega-test:/app/data delega:test
          sleep 10
          curl -sf http://localhost:18890/health || (docker logs delega-test && exit 1)
          docker stop delega-test
