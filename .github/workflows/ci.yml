name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest httpx

      - name: Lint (non-blocking, tracking existing issues)
        run: ruff check backend/ || true

      - name: Type check (non-blocking)
        run: |
          pip install pyright
          pyright backend/ || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t delega:test .

      - name: Verify container starts
        run: |
          docker run -d --name delega-test -p 8765:8765 -e SKIP_MIGRATIONS=1 delega:test
          sleep 5
          curl -sf http://localhost:8765/health || (docker logs delega-test && exit 1)
          docker stop delega-test
